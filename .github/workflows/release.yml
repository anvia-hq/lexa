name: Build and release binaries

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-check-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Check installer syntax
        run: sh -n install.sh

  build:
    name: Build ${{ matrix.name }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            archive: lexa-macos-apple-silicon
            exe: lexa
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            archive: lexa-macos-intel
            exe: lexa
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: lexa-linux-x86_64
            exe: lexa
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: lexa-windows-x86_64
            exe: lexa.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        env:
          ARCHIVE_NAME: ${{ matrix.archive }}
          EXE_NAME: ${{ matrix.exe }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            version="dev-${GITHUB_SHA::7}"
          fi

          package_dir="dist/${ARCHIVE_NAME}-${version}"
          mkdir -p "${package_dir}"
          cp "target/${TARGET}/release/${EXE_NAME}" "${package_dir}/"
          cp README.md LICENSE "${package_dir}/"

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            (cd dist && 7z a "${ARCHIVE_NAME}-${version}.zip" "./${ARCHIVE_NAME}-${version}/*")
          else
            tar -czf "dist/${ARCHIVE_NAME}-${version}.tar.gz" -C "dist" "${ARCHIVE_NAME}-${version}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release-assets/* --clobber
          else
            gh release create "${TAG}" release-assets/* --title "${TAG}" --generate-notes
          fi
