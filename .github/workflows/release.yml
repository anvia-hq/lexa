name: CI and release binaries

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-check-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Verify generated docs are in sync
        run: cargo run -p xtask -- gen-skill --check

      - name: Enforce v0.9 performance gates
        run: cargo run -p xtask -- perf-gate

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: www/pnpm-lock.yaml

      - name: Build website
        working-directory: www
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm audit --audit-level moderate

      - name: Check installer syntax
        run: |
          sh -n install.sh
          shellcheck install.sh

      - name: Check PowerShell installer syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path install.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

      - name: Verify release tag is on main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Release tags must point to commits already merged to main." >&2
            echo "Delete this tag, merge the PR, then recreate the tag on main." >&2
            exit 1
          fi

  test-platforms:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Test
        run: cargo test --locked

  build:
    name: Build ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, test-platforms]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            archive: lexa-macos-apple-silicon
            exe: lexa
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            archive: lexa-macos-intel
            exe: lexa
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: lexa-linux-x86_64
            exe: lexa
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: lexa-windows-x86_64
            exe: lexa.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        env:
          ARCHIVE_NAME: ${{ matrix.archive }}
          EXE_NAME: ${{ matrix.exe }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          package_dir="dist/${ARCHIVE_NAME}-${version}"
          mkdir -p "${package_dir}"
          cp "target/${TARGET}/release/${EXE_NAME}" "${package_dir}/"
          cp README.md LICENSE "${package_dir}/"

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            (cd dist && 7z a "${ARCHIVE_NAME}-${version}.zip" "./${ARCHIVE_NAME}-${version}/*")
          else
            tar -czf "dist/${ARCHIVE_NAME}-${version}.tar.gz" -C "dist" "${ARCHIVE_NAME}-${version}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.archive }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-assets
          merge-multiple: true

      - name: Add installers and checksums
        run: |
          cp install.sh install.ps1 release-assets/
          cd release-assets
          for asset in *; do
            if [ "$asset" != "SHA256SUMS" ]; then
              sha256sum "$asset"
            fi
          done > SHA256SUMS

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release-assets/* --clobber
          else
            gh release create "${TAG}" release-assets/* --title "${TAG}" --generate-notes
          fi
